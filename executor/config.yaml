# =====================================================================
# Executor configuration — Binance Futures
# WARNING: leverage & position_size_usdt are CONSERVATIVE defaults.
# Change ONLY after explicit user request with specific numbers.
# testnet flag here is IGNORED if BINANCE_TESTNET env var is set
# (env var wins; default MUST stay testnet=true).
# =====================================================================

binance:
  testnet: true            # default; overridden by env BINANCE_TESTNET
  testnet_url: https://testnet.binancefuture.com/fapi

executor:
  poll_interval_seconds: 30
  signal_file: signals/latest_signal.json
  db_file: runtime/bot.db          # SQLite: state + orders history (replaces state.json + orders_history.jsonl)
  log_file: runtime/executor.log
  # Max signals acted on per scan batch. Each = one position. Caps concurrent
  # exposure (position_size_usdt x N). Raise/lower to taste.
  max_signals_per_run: 10
  # Flag file created by the executor when the daily trade limit is reached.
  # The scanner (vibe-trading) checks it and skips scanning while present,
  # saving LLM quota. Auto-removed on daily rollover.
  scan_pause_file: runtime/SCAN_PAUSED

risk_guard:
  min_confidence: 0.60
  max_signal_age_seconds: 300
  max_daily_trades: 50            # raised from 10 per explicit user request (2026-07-15)
  kill_switch_file: runtime/KILL_SWITCH   # cwd-relative; shared volume in docker
  allowed_actions:
    - BUY
    - SELL

trading:
  # CONSERVATIVE DEFAULTS — flag for user confirmation (see RUN_REPORT.md)
  leverage: 10             # set to 10 per explicit user request (2026-07-14)
  # 60 USDT = above Binance Futures MIN_NOTIONAL floor (BTCUSDT=50). Not a risk
  # increase — it is the exchange's hard minimum to place any order. Lower only
  # if trading symbols with a smaller min notional (ETH=20, SOL/BNB/XRP=5).
  position_size_usdt: 60
  sl_percent: 2.0          # stop loss %
  tp_percent: 4.0          # take profit %
  # symbols_allowed: empty = allow ALL USDT-perp that the scanner emits.
  # To restrict trading to a whitelist, list symbols here (e.g. [BTCUSDT, ETHUSDT]).
  symbols_allowed: []
